<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="style.css">

<body>
    
    <header>
        <nav>
            <div class="logo">
                <img src="assets/logo-pokedex.png" alt="Logo" width="50%">
            </div>
            <ul>
                <li><a href="pokedex-main/mainpage.html" class="btn-nav">Pokedex</a></li>

    <section class="card-add-content">

            <div class="card-add-head">

                <div class="card-add-head-title">

            <ul class="card-add-info-content">

            </ul>

        </div>

<!--card 2-->
        <div class="card-add-empty">
            <div class="card-add-empty-circle">

<!--card 3-->
        <div class="card-add-empty">

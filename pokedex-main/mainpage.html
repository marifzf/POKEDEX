<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex</title>
    <link rel="stylesheet" href="style-mainpage.css">
</head>
<body>

    <div class="bubbles-container">
        <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
        <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
    </div>
    <div class="pokeballs-container">
        <div class="pokeball p-1"></div><div class="pokeball p-2"></div><div class="pokeball p-3"></div>
    </div>

    <div class="main-wrapper">
        <header>
            <nav>
                <div class="logo">
                    <img src="../assets/logo-pokedex.png" alt="Logo">
                </div>
                <ul>
                    <li><a href="../index.html" class="btn-nav">Início</a></li>
                    <li><a href="#" class="btn-nav active">Pokedex</a></li>
                    <li><a href="#" class="btn-nav">Comparar</a></li>
                    <li><a href="#" class="btn-nav">Favoritos</a></li>
                    <li><a href="#" class="btn-nav">Login</a></li>
                </ul>
            </nav>
        </header>

        <div class="search-sort-bar">
            <div class="search-container">
                <span>🔍</span>
                <input type="text" id="searchInput" placeholder="Buscar por nome ou número...">
            </div>
            <div class="sort-container">
                <span>⇅</span>
                <span class="sort-text">Ordenar por: Número</span>
                <span>▼</span>
            </div>
        </div>

        <main class="pokemon-grid" id="pokemonGrid"></main>
    
         <div class="load-more-container">
            <button id="loadMoreBtn" onclick="loadMore()">Carregar Mais</button>
         </div>
    </div>

    <button id="backToTop" onclick="scrollToTop()">↑</button>

    <script src="script-mainpage.js"></script>
</body>
</html>

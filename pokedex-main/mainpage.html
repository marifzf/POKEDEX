<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex - Bruna Padilha</title>
    <link rel="stylesheet" href="style-mainpage.css">
</head>
<body>

    <div class="bubbles-container">
        <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
        <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
    </div>
    <div class="pokeballs-container">
        <div class="pokeball p-1"></div><div class="pokeball p-2"></div><div class="pokeball p-3"></div>
    </div>

    <div class="main-wrapper">
        <header class="main-header">
            <img src="https://upload.wikimedia.org/wikipedia/commons/9/98/International_Pok%C3%A9mon_logo.svg" alt="Pokémon Logo" class="logo">
            <nav class="nav-links">
                <a href="../index.html" class="nav-btn">Início</a>
                <a href="#" class="nav-btn active">Pokedex</a>
                <a href="#" class="nav-btn">Comparar</a>
                <a href="#" class="nav-btn">Favoritos</a>
                <a href="" class="nav-btn">Login</a>                                
                <div class="profile-icon">👤</div>
            </nav>
        </header>

        <div class="search-sort-bar">
            <div class="search-container">
                <span>🔍</span>
                <input type="text" id="searchInput" placeholder="Buscar por nome ou número...">
            </div>
            <div class="sort-container">
                <span>⇅</span>
                <span class="sort-text">Ordenar por: Número</span>
                <span>▼</span>
            </div>
        </div>

        <main class="pokemon-grid" id="pokemonGrid"></main>
    
         <div class="load-more-container">
            <button id="loadMoreBtn" onclick="loadMore()">Carregar Mais</button>
         </div>
    </div>

    <script>
        const pokemonData = [
            { id: 1, name: "Bulbasaur", type: ["grass", "poison"], hp: 45, attack: 49, defense: 49, moves: ["Tackle", "Vine Whip"], image: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/1.png" },
            { id: 2, name: "Ivysaur", type: ["grass", "poison"], hp: 60, attack: 62, defense: 63, moves: ["Razor Leaf", "Sweet Scent"], image: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/2.png" },
            { id: 3, name: "Venusaur", type: ["grass", "poison"], hp: 80, attack: 82, defense: 83, moves: ["Solar Beam", "Sleep Powder"], image: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/3.png" },
            { id: 4, name: "Charmander", type: ["fire"], hp: 39, attack: 52, defense: 43, moves: ["Scratch", "Ember"], image: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/4.png" },
            { id: 5, name: "Charmeleon", type: ["fire"], hp: 58, attack: 64, defense: 58, moves: ["Flamethrower", "Slash"], image: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/5.png" },
            { id: 6, name: "Charizard", type: ["fire", "flying"], hp: 78, attack: 84, defense: 78, moves: ["Fire Blast", "Fly"], image: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/6.png" },
            { id: 7, name: "Squirtle", type: ["water"], hp: 44, attack: 48, defense: 65, moves: ["Bubble", "Water Gun"], image: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/7.png" },
            { id: 8, name: "Wartortle", type: ["water"], hp: 59, attack: 63, defense: 80, moves: ["Bite", "Rapid Spin"], image: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/8.png" },
            { id: 9, name: "Blastoise", type: ["water"], hp: 79, attack: 83, defense: 100, moves: ["Hydro Pump", "Skull Bash"], image: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/9.png" },
            { id: 10, name: "Caterpie", type: ["bug"], hp: 45, attack: 30, defense: 35, moves: ["Tackle", "String Shot"], image: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/10.png" },
            { id: 11, name: "Metapod", type: ["bug"], hp: 50, attack: 20, defense: 55, moves: ["Harden"], image: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/11.png" },
            { id: 12, name: "Butterfree", type: ["bug", "flying"], hp: 60, attack: 45, defense: 50, moves: ["Confusion", "Gust"], image: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/12.png" },
            { id: 13, name: "Weedle", type: ["bug", "poison"], hp: 40, attack: 35, defense: 30, moves: ["Poison Sting", "String Shot"], image: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/13.png" },
            { id: 14, name: "Kakuna", type: ["bug", "poison"], hp: 45, attack: 25, defense: 50, moves: ["Harden"], image: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/14.png" },
            { id: 15, name: "Beedrill", type: ["bug", "poison"], hp: 65, attack: 90, defense: 40, moves: ["Twineedle", "Rage"], image: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/15.png" },
            { id: 16, name: "Pidgey", type: ["normal", "flying"], hp: 40, attack: 45, defense: 40, moves: ["Gust", "Quick Attack"], image: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/16.png" },
            { id: 17, name: "Pidgeotto", type: ["normal", "flying"], hp: 63, attack: 60, defense: 55, moves: ["Wing Attack", "Twister"], image: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/17.png" },
            { id: 18, name: "Pidgeot", type: ["normal", "flying"], hp: 83, attack: 80, defense: 75, moves: ["Sky Attack", "Hurricane"], image: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/18.png" },
            { id: 19, name: "Rattata", type: ["normal"], hp: 30, attack: 56, defense: 35, moves: ["Quick Attack", "Hyper Fang"], image: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/19.png" },
            { id: 20, name: "Raticate", type: ["normal"], hp: 55, attack: 81, defense: 60, moves: ["Super Fang", "Crunch"], image: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/20.png" },
            { id: 21, name: "Spearow", type: ["normal", "flying"], hp: 40, attack: 60, defense: 30, moves: ["Peck", "Pursuit"], image: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/21.png" },
            { id: 22, name: "Fearow", type: ["normal", "flying"], hp: 65, attack: 90, defense: 65, moves: ["Drill Peck", "Agility"], image: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/22.png" },
            { id: 23, name: "Ekans", type: ["poison"], hp: 35, attack: 60, defense: 44, moves: ["Wrap", "Poison Sting"], image: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/23.png" },
            { id: 24, name: "Arbok", type: ["poison"], hp: 60, attack: 95, defense: 69, moves: ["Bite", "Acid"], image: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/24.png" },
            { id: 25, name: "Pikachu", type: ["electric"], hp: 35, attack: 55, defense: 40, moves: ["Thunder Shock", "Thunderbolt"], image: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png" },
            { id: 26, name: "Raichu", type: ["electric"], hp: 60, attack: 90, defense: 55, moves: ["Thunder", "Iron Tail"], image: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/26.png" },
            { id: 27, name: "Sandshrew", type: ["ground"], hp: 50, attack: 75, defense: 85, moves: ["Scratch", "Sand Attack"], image: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/27.png" },
            { id: 28, name: "Sandslash", type: ["ground"], hp: 75, attack: 100, defense: 110, moves: ["Slash", "Earthquake"], image: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/28.png" },
            { id: 29, name: "Nidoran♀", type: ["poison"], hp: 55, attack: 47, defense: 52, moves: ["Growl", "Scratch"], image: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/29.png" },
            { id: 30, name: "Nidorina", type: ["poison"], hp: 70, attack: 62, defense: 67, moves: ["Bite", "Poison Fang"], image: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/30.png" }
        ];

        const grid = document.getElementById('pokemonGrid');
        const loadMoreBtn = document.getElementById('loadMoreBtn');
        
        let itemsToShow = 8;
        const increment = 4;

        function renderCards() {
            const visiblePokemon = pokemonData.slice(0, itemsToShow);
            
            grid.innerHTML = visiblePokemon.map(pokemon => {
                let backgroundStyle = '';
                if (pokemon.type.length > 1) {
                    const color1 = `var(--clr-${pokemon.type[0]})`;
                    const color2 = `var(--clr-${pokemon.type[1]})`;
                    backgroundStyle = `background: linear-gradient(45deg, ${color1} 0%, ${color2} 100%);`;
                } else {
                    backgroundStyle = `background-color: var(--clr-${pokemon.type[0]});`;
                }

                return `
                    <div class="pokemon-card-container">
                        <div class="pokemon-card-base" style="${backgroundStyle}">
                            
                            <span class="hp-badge">HP ${pokemon.hp}</span>

                            <div class="favorite-toggle" onclick="toggleFavorite(this)">
                                <div class="pokeball-icons-wrapper">
                                    <svg class="icon-outline" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="10" stroke="white" stroke-width="2" fill="transparent"/><path d="M2 12h20" stroke="white" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="12" r="3" stroke="white" stroke-width="2" fill="transparent"/></svg>
                                    <svg class="icon-filled" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C6.48 2 2 6.48 2 12h20C22 6.48 17.52 2 12 2z" fill="#EE1515"/><path d="M12 22c5.52 0 10-4.48 10-10H2c0 5.52 4.48 10 10 10z" fill="white"/><rect x="2" y="10.5" width="20" height="3" fill="#222222"/><circle cx="12" cy="12" r="10" stroke="#222222" stroke-width="1.5" fill="transparent"/><circle cx="12" cy="12" r="4" fill="white" stroke="#222222" stroke-width="1.5"/><circle cx="12" cy="12" r="2.5" fill="white" stroke="#222222" stroke-width="1"/></svg>
                                </div>
                            </div>

                            <img src="${pokemon.image}" class="pokemon-image">

                            <div class="glass-info-panel">
                                <div class="header-row">
                                    <h3 class="pokemon-name">${pokemon.name}</h3>
                                    <span class="pokemon-number">#${pokemon.id.toString().padStart(3, '0')}</span>
                                </div>
                                <div class="types-wrapper">
                                    ${pokemon.type.map(t => `<span class="type-badge ${t}">${t}</span>`).join('')}
                                </div>
                            </div>
                        </div>

                        <button class="expand-btn" onclick="toggleDetails(this)">▼</button>
                        
                        <div class="details-panel">
                            <div class="details-content">
                                <div class="stat-row"><span>Ataque</span><span class="stat-val">${pokemon.attack}</span></div>
                                <div class="stat-row"><span>Defesa</span><span class="stat-val">${pokemon.defense}</span></div>
                                <div class="moves-section">
                                    <p>Ataques:</p>
                                    <div class="moves-grid">
                                        ${pokemon.moves.map(move => `<button class="pixel-move-btn">${move}</button>`).join('')}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            if (itemsToShow >= pokemonData.length) {
                loadMoreBtn.style.display = 'none';
            }
        }

        function loadMore() {
            itemsToShow += increment;
            renderCards();
        }

        function toggleDetails(btn) {
            const panel = btn.nextElementSibling;
            panel.classList.toggle('open');
            btn.textContent = panel.classList.contains('open') ? '▲' : '▼';
        }

        function toggleFavorite(el) {
            el.classList.toggle('is-favorite');
        }

        renderCards();

        window.onscroll = function() {
            const btn = document.getElementById("backToTop");
            if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) {
                btn.classList.add("show");
            } else {
                btn.classList.remove("show");
            }
        };

        function scrollToTop() {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        }
    </script>
    <button id="backToTop" onclick="scrollToTop()">↑</button>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
        <div class="bubbles-container">
            <div class="bubble"></div>
            <div class="bubble"></div>
            <div class="bubble"></div>
            <div class="bubble"></div>
            <div class="bubble"></div>
            <div class="bubble"></div>
            <div class="bubble"></div>
            <div class="bubble"></div>
        </div>

        <div class="pokeballs-container">
            <div class="pokeball p-1"></div>
            <div class="pokeball p-2"></div>
            <div class="pokeball p-3"></div>
            <div class="pokeball p-4"></div>
            <div class="pokeball p-5"></div>
            <div class="pokeball p-6"></div>
            <div class="pokeball p-7"></div>
            <div class="pokeball p-8"></div>
        </div>

    <header>
        <nav>
            <div class="logo">
                <img src="assets/logo-pokedex.png" alt="Logo">
            </div>
            <ul>
                <li><a href="#" class="btn-nav">Pokedex</a></li>
                <li><a href="#" class="btn-nav">Comparar</a></li>
                <li><a href="#" class="btn-nav">Favoritos</a></li>
                <li><a href="#" class="btn-nav">Login</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero-banner">
            <div class="hero-content">
                <h1>Explore o mundo <span>Pokemon!</span></h1>
                <p>Descubra todos os Pokemons com sua Pokedex digital:</p>
                <button class="btn-start">COMECE AGORA</button>
            </div>
            <div class="hero-image">
                <img src="assets/trio-pokemon.png" alt="Pikachu, Squirtle e Charmander">
            </div>
        </section>
    </main>

    <section class="destaques">
       <h2>Pokemons em destaque:</h2>
            <div class="carousel-container">
                <button class="arrow-btn left" onclick="scrollCarousel(-1)">&#10094;</button>
                    <div id="pokemon-list" class="pokemon-container"></div>
                <button class="arrow-btn right" onclick="scrollCarousel(1)">&#10095;</button>
            </div>
    </section>
<script src="script.js"></script>.
</body>
</html>
